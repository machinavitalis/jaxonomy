[pytest]
markers =
    minimal: test basic functionality only (should run quickly)
    app: marks tests that start with a model.json (deselect with '-m "not app"')
    dashboard: marks dashboard integration tests (deselect with '-m "not dashboard"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    timeout: mark a test to have a timeout
    asyncio: mark a test to use asyncio
    flaky: mark a test as flaky
    autodiff_full: marks the full property-based gradient sweep (T-001 nightly); deselect with '-m "not autodiff_full"'

testpaths =
    test

# From https://docs.pytest.org/en/stable/example/markers.html
# > "You can use and, or, not and parentheses."
# --timeout bounds each test in the default (quick) tier so a hanging test can't
# wedge the whole run / CI. Nightly overrides addopts, so it is unaffected;
# genuinely long tests should be marked slow or carry @pytest.mark.timeout(N).
addopts = --strict-markers --timeout=180 -m "not dashboard and not slow and not autodiff_full"

norecursedirs = test/workdir .hypothesis

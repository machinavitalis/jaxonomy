          - Hybrid ML + physics predictor: examples/hybrid_ml_physics_predictor.ipynb
      - Battery series:
          - 01 - Battery ECM: examples/battery_part_1_ecm_model.ipynb
          - 02 - Using synthetic data: examples/battery_part_2_parameter_estimation_synthetic_data.ipynb
          - 03 - Using experimental data: examples/battery_part_3_parameter_estimation_real_data.ipynb
          - 04 - Dynamic mode decomposition: examples/battery_part_4_data_driven_models_DMDc.ipynb
          - 05 - Extended DMD: examples/battery_part_5_data_driven_models_eDMDc.ipynb

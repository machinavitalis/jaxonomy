          - 02 - Closed-loop MPC + MuJoCo render: examples/booster_part_2_mpc_and_render.ipynb
          - 03 - Atmosphere + multi-phase guidance: examples/booster_part_3_atmosphere_and_phases.ipynb
          - 04 - High-fidelity propulsion: examples/booster_part_4_high_fidelity_propulsion.ipynb
          - 05 - Sensing and EKF: examples/booster_part_5_sensing_and_estimation.ipynb

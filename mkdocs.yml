          - 03 - Aero map fitting from sparse CFD: examples/f1_part_3_aero_map_fitting.ipynb
          - 04 - Sobol-driven CFD budget: examples/f1_part_4_sobol_cfd_budget.ipynb
          - 05 - NACA airfoil SU2 co-sim: examples/f1_part_5_naca_su2_cosim.ipynb
          - 06 - DrivAerML hero shape optimisation: examples/f1_part_6_drivaerml_hero.ipynb
  - Performance and operations:

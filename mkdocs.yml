# SPDX-License-Identifier: MIT

site_name: jaxonomy
site_url: https://py.jaxonomy.com
site_description: >-
  Jaxonomy — block-diagram simulation for hybrid dynamical systems (JAX, NumPy API,
  tutorials, examples, and API reference).

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: jaxonomy
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: jaxonomy-dark
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

  logo: img/logo_white.svg
  favicon: img/favicon.ico
  custom_dir: docs/overrides

  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand

  font:
    text: Barlow
    code: Roboto Mono

# To use LaTeX in the docs:
# https://mrkeo.github.io/reference/mathjax/

# Somehow MathJax didn't work immediately, so using KaTeX instead
# markdown_extensions:
#   - pymdownx.arithmatex:
#       generic: true
# extra_javascript:
#   - javascripts/mathjax.js
#   - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # https://mkdocstrings.github.io/python/usage/configuration/general/
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_root_full_path: true
  - mkdocs-jupyter:
      ignore_h1_titles: true
      execute: false
      include_source: true

nav:
  - index.md
  - installation.md
  - Scope — PINNs & PDEs: scope/pinn.md
  - Scope — ROM & surrogates: scope/rom.md
  - API Reference:
      - framework.md
      - library.md
      - simulation.md
      - optimization.md
  - Tutorials:
      - tutorials/index.md
      - Getting started: tutorials/01-getting-started.ipynb
      - Custom blocks: tutorials/02-creating-custom-blocks.ipynb
      - Custom Acausal Components: tutorials/03-creating-custom-acausal-components.ipynb
      - Wrappers: tutorials/04-wrappers.ipynb
      - Optimization: tutorials/05-automatic-differentiation-optimization.ipynb
  - Examples:
      - examples/index.md
      - Introductory:
          - Primitive blocks: examples/primitives.ipynb
          - Block diagram visualization: examples/diagram_visualization.ipynb
          - Bouncing ball: examples/bouncing_ball.ipynb
          - LQR control: examples/lqr.ipynb
          - Energy shaping: examples/energy_shaping_and_lqr.ipynb
          - Linear MPC: examples/linear_mpc.ipynb
          - Multi-layer perceptron: examples/MLP_training.ipynb
          - Custom block authoring: examples/custom_block_authoring.ipynb
      - Advanced:
          - Trajectory optimization: examples/trajectory_optimization_and_stabilization.ipynb
          - Robotic Arm Control: examples/mujoco/pick_and_place.ipynb
          - PID tuning (autodiff): examples/pid_tuning.ipynb
          - PID tuning with constraints: examples/pid_autotuning_interactive.ipynb
          - PID 2-DOF + classical tuners: examples/pid_2dof_classical_tuning.ipynb
          - Limit cycles: examples/limit_cycles.ipynb
          - Kalman Filters: examples/state_estimation_with_Kalman_filters.ipynb
          - UDEs and SR: examples/ude_and_sr_lotka_volterra.ipynb
          - Differentiable predictive control (two-tank): examples/dpc_two_tank_reference_tracking.ipynb
          - Vehicle handling (autodiff): examples/vehicle_handling_autodiff.ipynb
          - HL-20 glide autopilot: examples/hl20_glide_autopilot.ipynb
          - Differentiable audio DSP: examples/differentiable_audio_dsp.ipynb
          - RL environment from a diagram: examples/rl_environment_from_diagram.ipynb
          - Artificial pancreas (MPC): examples/artificial_pancreas_mpc.ipynb
          - Satellite ADCS + EKF: examples/aerospace_adcs_ekf_wheels.ipynb
          - Grid-forming microgrid: examples/grid_forming_microgrid.ipynb
          - Wind turbine control (DFIG): examples/dfig_wind_turbine.ipynb
      - Solvers and DAEs:
          - Stiff chemistry (Robertson, BDF): examples/stiff_robertson_bdf.ipynb
          - DAE constraint projection: examples/dae_projection_pendulum.ipynb
          - Differentiable acausal DAEs: examples/neural_dae_pendulum_drag.ipynb
          - Conservation laws as CI: examples/conservation_laws_as_ci.ipynb
      - Workflows (T-1XX shipped):
          - Unit-safe wiring: examples/unit_safe_wiring.ipynb
          - Linearization workflow: examples/linearization_workflow.ipynb
          - Engine map fitting → MPC: examples/engine_map_fitting_to_mpc.ipynb
          - Actuator delay identification: examples/actuator_delay_identification.ipynb
          - Multirate controller (1k/100/10 Hz): examples/multirate_controller.ipynb
          - Real-time fixed-step controller: examples/realtime_fixed_step_controller.ipynb
          - Container blocks tour: examples/container_blocks_tour.ipynb
          - Truth tables + state machines: examples/truth_table_gear_logic.ipynb
          - Product-family variants: examples/product_family_variants.ipynb
          - Fast restart and batched sweeps: examples/fast_restart_and_batched_sweeps.ipynb
          - Aleatoric vs epistemic UQ (Sobol): examples/aleatoric_vs_epistemic_uq.ipynb

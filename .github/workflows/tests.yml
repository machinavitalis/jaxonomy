name: Tests

on:
  workflow_dispatch:
    inputs:
      rebaseline:
        description: >-
          Regenerate benchmark baselines on this runner and upload them as an
          artifact (skips the regular gates). Download the artifact and commit
          the JSONs to benchmarks/ to adopt them.
        type: boolean
        default: false

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    # 07:00 UTC daily → nightly comprehensive run (slow + autodiff_full tests)
    - cron: "0 7 * * *"
    # 06:00 UTC every Monday → weekly public benchmark suite
    - cron: "0 6 * * 1"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── quick suite on every PR / push to main ─────────────────────────────────
  # Installs only the `test` extra (which includes control + pandas — soft deps
  # of library code that lazy-imports them at runtime). Tests needing heavier
  # optional libraries (pysindy, tensorflow, torch, pytwin, ...) skip via
  # pytest.importorskip at collection; the nightly test-full job runs them all.
  quick:
    name: Quick test suite
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !inputs.rebaseline
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run quick suite (excludes slow, dashboard, autodiff_full)
        run: pytest -q --tb=short -n auto

  # ── autodiff smoke: the small PR-time gradient test set ────────────────────
  autodiff-smoke:
    name: Gradient smoke tests (framework + stateless blocks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !inputs.rebaseline
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run autodiff framework + stateless block sweep
        run: |
          pytest -q --tb=short \
            test/autodiff/test_gradient_property_pilot.py \
            test/autodiff/test_block_gradients_stateless.py

  # ── nightly comprehensive (slow + autodiff_full) ───────────────────────────
  # Installs the `test-full` extra which pulls every optional runtime library so
  # the full test matrix (including control, pysindy, mujoco, torch, ...) runs.
  nightly:
    name: Nightly comprehensive suite
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && !inputs.rebaseline
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # cyipopt (pulled in via the `all` extra) builds from source against the
      # system IPOPT library; without it the whole `test-full` install fails.
      - name: Install IPOPT (build dep of cyipopt)
        run: sudo apt-get update && sudo apt-get install -y coinor-libipopt-dev

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test-full]"

      - name: Run full suite (slow + autodiff_full, excludes dashboard)
        run: |
          pytest -q --tb=short \
            -m "not dashboard" \
            --override-ini="addopts=--strict-markers"

  # ── compile-time regression gate ──────────────────────────────────────────
  # Re-runs the compile-time benchmark and fails if any case regresses beyond
  # the threshold encoded in benchmarks/compile_time.py (currently +50 %).
  # The check tolerates SKIPPED cases (e.g. when an optional dep is missing)
  # so it never blocks PRs on environment drift.
  compile-time:
    name: Compile-time regression gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !inputs.rebaseline
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run compile-time benchmark with --check
        run: python benchmarks/compile_time.py --check

  # ── FMU official-validator gate (T-026c) ──────────────────────────────────
  # Validates every FMU produced by build_fmu with the official checkers:
  # fmpy.validate_fmu (hard gate, zero findings) and VDMCheck2 (the strict
  # INTO-CPS static VDM-SL checker of modelDescription.xml — JVM-based, so
  # it runs here with a cached distribution rather than in the quick suite).
  fmu-validators:
    name: FMU official validators
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !inputs.rebaseline
    env:
      VDMCHECK_VERSION: "1.1.3"
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java 17 (for VDMCheck)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache VDMCheck distribution
        id: vdmcheck-cache
        uses: actions/cache@v4
        with:
          path: ~/vdmcheck
          key: vdmcheck2-${{ env.VDMCHECK_VERSION }}

      - name: Download VDMCheck2
        if: steps.vdmcheck-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/vdmcheck
          curl -sSL -o ~/vdmcheck/vdmcheck2.zip \
            "https://github.com/INTO-CPS-Association/FMI-VDM-Model/releases/download/Release/${VDMCHECK_VERSION}/vdmcheck2-${VDMCHECK_VERSION}-distribution-rules.zip"
          unzip -o ~/vdmcheck/vdmcheck2.zip -d ~/vdmcheck

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,fmu]"

      - name: Run official-validator suite
        run: |
          set -o pipefail  # pytest's failure must not be masked by tee
          VDMCHECK2="$(find ~/vdmcheck -name 'VDMCheck2.sh' | head -1)"
          export VDMCHECK2
          echo "Using VDMCHECK2=$VDMCHECK2"
          pytest -q --tb=short \
            test/library/test_t_026c_fmu_official_validation.py \
            | tee fmu_validation.log

      - name: Publish validation summary
        if: always()
        run: |
          {
            echo "## FMU official-validator results (T-026c)"
            echo ""
            echo '| Check | Result |'
            echo '|---|---|'
            tail -3 fmu_validation.log | head -1 | \
              sed 's/^/| pytest summary | /; s/$/ |/'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── memory regression gate ────────────────────────────────────────────────
  # Re-runs the memory benchmark and fails if any case's peak RSS regresses
  # beyond the threshold encoded in benchmarks/memory.py (currently +50 %).
  # Same trigger pattern as compile-time (PR + push to main, NOT scheduled).
  memory:
    name: Memory regression gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && !inputs.rebaseline
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run memory benchmark with --check
        run: python benchmarks/memory.py --check

  # ── public benchmark suite (weekly + manual only) ─────────────────────────
  # Cartpole / quadruped / sysid / linearization. NOT on PR or push: each
  # full run takes several minutes (the sysid step alone is ~7 s on CPU and
  # the quadruped batch needs a fresh XLA compile).  The compile/memory
  # gates above are the per-PR backstop; this one runs weekly to track
  # public-facing throughput numbers and is also available on
  # workflow_dispatch for manual re-baselining.
  public-benchmarks:
    name: Weekly public benchmark suite (cartpole / quadruped / sysid)
    runs-on: ubuntu-latest
    if: >-
      ((github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1')
      || github.event_name == 'workflow_dispatch')
      && !inputs.rebaseline
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run public benchmark suite with --check
        run: python benchmarks/public.py --check

      - name: Upload baseline JSON as artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: public-benchmark-baseline
          path: benchmarks/public_baseline.json
          if-no-files-found: ignore

  # ── benchmark rebaseline (manual only) ────────────────────────────────────
  # The compile-time / memory / public baselines must be recorded on the same
  # hardware the gates run on (ubuntu-latest). Trigger this via
  # workflow_dispatch with `rebaseline: true`, download the artifact, and
  # commit the three JSONs to benchmarks/. public.py merges into the existing
  # file, so non-CPU device columns (gpu_t4, ...) are preserved.
  rebaseline:
    name: Regenerate benchmark baselines on CI hardware
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.rebaseline
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Regenerate compile-time baseline
        run: python benchmarks/compile_time.py

      - name: Regenerate memory baseline
        run: python benchmarks/memory.py

      - name: Regenerate public benchmark baseline (cpu column)
        run: python benchmarks/public.py

      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v5
        with:
          name: ci-benchmark-baselines
          path: |
            benchmarks/compile_time_baseline.json
            benchmarks/memory_baseline.json
            benchmarks/public_baseline.json

  # ── public-benchmarks GPU job (DISABLED: needs self-hosted runners) ───────
  # Uncomment when GPU runners are provisioned. Requires
  #   `runs-on: [self-hosted, linux, gpu]`
  # plus a runner labelled with the actual accelerator (`t4`/`a100`/`h100`).
  # The matrix below populates `gpu_t4` / `gpu_a100` / `gpu_h100` columns in
  # benchmarks/public_baseline.json — these columns are independent of the
  # CPU-only `public-benchmarks` job above and never block CPU CI.
  #
  # public-benchmarks-gpu:
  #   name: Weekly public benchmark suite on GPU
  #   if: github.event_name == 'workflow_dispatch'
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       include:
  #         - device_key: gpu_t4
  #           runs_on: [self-hosted, linux, gpu, t4]
  #         - device_key: gpu_a100
  #           runs_on: [self-hosted, linux, gpu, a100]
  #         - device_key: gpu_h100
  #           runs_on: [self-hosted, linux, gpu, h100]
  #   runs-on: ${{ matrix.runs_on }}
  #   timeout-minutes: 45
  #   env:
  #     JAXONOMY_BENCH_DEVICE: gpu
  #   steps:

  #       with:
  #         lfs: true
  #     - name: Set up Python 3.11
  #       uses: actions/setup-python@v6
  #       with:
  #         python-version: "3.11"
  #         cache: pip
  #     - name: Install (with CUDA-flavour JAX)
  #       run: |
  #         python -m pip install --upgrade pip
  #         pip install -e ".[test]" "jax[cuda12]"
